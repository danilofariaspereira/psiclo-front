<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO</title>
  <link rel="icon" href="img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/reset.css" />
  <link rel="stylesheet" href="styles/variables.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/login.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* Transição suave entre páginas */
    #app-content {
      animation: none;
    }
    #app-content.page-enter {
      animation: pageIn 0.18s ease forwards;
    }
    @keyframes pageIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="app-layout" id="app-shell" style="display:none">
    <aside class="sidebar" id="sidebar" aria-label="Menu lateral"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main" id="app-content"></main>
  </div>

  <!-- Tela de login inline -->
  <div id="login-screen">
    <div class="login-page">
      <div class="login-card">
        <img src="img/logo-psiclo.png" alt="PSICLO" class="login-logo" />
        <h1 class="login-title">Bem-vindo</h1>
        <p class="login-subtitle">Acesse sua conta para continuar</p>
        <div class="login-form">
          <div class="form-group">
            <label class="form-label">E-mail</label>
            <input type="email" id="login-email" class="form-input" placeholder="seu@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" id="login-password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
          </div>
          <p id="login-error" style="color:var(--color-error);font-size:.85rem;min-height:1.2rem"></p>
          <button class="btn btn--primary" id="login-btn" style="width:100%;justify-content:center">Entrar</button>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="app.js"></script>
</body>
</html>

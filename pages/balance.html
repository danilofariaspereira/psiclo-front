<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Balanço</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main">

      <div class="page-header">
        <h1 class="page-title">Balanço financeiro</h1>
      </div>

      <!-- 4 cards -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
        <div class="stat-card">
          <p class="stat-card__label">Faturamento</p>
          <p class="stat-card__value stat-card__value--green" id="b-revenue">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Despesas</p>
          <p class="stat-card__value stat-card__value--red" id="b-expenses">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Lucro estimado</p>
          <p class="stat-card__value" id="b-profit">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Meta mensal</p>
          <p class="stat-card__value" id="b-goal">—</p>
        </div>
      </div>

      <!-- Gráficos lado a lado, menores -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1.5rem">
        <div class="card card--blue">
          <p class="card__title">Progresso da meta</p>
          <div style="max-width:200px;margin:.5rem auto">
            <canvas id="chart-goal" height="200"></canvas>
          </div>
          <p id="goal-msg" style="text-align:center;font-size:.82rem;color:rgba(255,255,255,.75);margin-top:.4rem"></p>
        </div>
        <div class="card card--blue">
          <p class="card__title">Faturamento vs Despesas</p>
          <canvas id="chart-bar" height="160"></canvas>
        </div>
      </div>

    </main>
  </div>
  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="../pages/balance.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Entrar</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/login.css" />
</head>
<body class="login-page">

  <div class="login-card">
    <div class="login-card__logo">
      <img src="../img/logo-psiclo.png" alt="PSICLO" height="48" />
    </div>

    <h1 class="login-card__title">Bem-vindo de volta</h1>
    <p class="login-card__sub">Acesse sua conta para continuar</p>

    <form id="login-form" class="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">E-mail</label>
        <input
          id="email"
          type="email"
          name="email"
          class="form-input"
          placeholder="seu@email.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Senha</label>
        <div class="input-password">
          <input
            id="password"
            type="password"
            name="password"
            class="form-input"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="input-password__toggle" aria-label="Mostrar senha" data-target="password">
            👁
          </button>
        </div>
      </div>

      <div id="login-error" class="login-error" hidden></div>

      <button type="submit" class="btn btn--primary btn--full" id="login-btn">
        Entrar
      </button>
    </form>
  </div>

  <script type="module" src="../pages/login.js"></script>
</body>
</html>

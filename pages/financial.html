<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Financeiro</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main">

      <div class="page-header">
        <h1 class="page-title">Financeiro</h1>
        <div style="display:flex;gap:.5rem">
          <button class="btn btn--ghost" id="btn-set-goal">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
            Definir meta
          </button>
          <button class="btn btn--primary" id="btn-add-expense">+ Nova despesa</button>
        </div>
      </div>

      <!-- 4 cards -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
        <div class="stat-card">
          <p class="stat-card__label">Despesas do mês</p>
          <p class="stat-card__value stat-card__value--red" id="f-expenses">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Faturamento do mês</p>
          <p class="stat-card__value stat-card__value--green" id="f-paid">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Falta para a meta</p>
          <p class="stat-card__value" id="f-remaining">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Meta do mês</p>
          <p class="stat-card__value" id="f-goal">—</p>
        </div>
      </div>

      <!-- Despesas em cards -->
      <div class="card" style="margin-bottom:1.5rem">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem">
          <p class="card__title" style="margin:0">Despesas fixas</p>
        </div>
        <div id="expenses-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem">
          <p style="color:var(--color-text-muted);font-size:.85rem;grid-column:1/-1">Carregando...</p>
        </div>
      </div>

      <!-- Pagamentos recebidos com filtros -->
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem;margin-bottom:.75rem">
          <p class="card__title" style="margin:0">Pagamentos recebidos</p>
          <div style="display:flex;gap:.5rem;flex-wrap:wrap;align-items:center">
            <input type="text" id="filter-client" class="form-input" placeholder="Filtrar por cliente..." style="width:180px;padding:6px 10px;font-size:.82rem" />
            <input type="date" id="filter-date-from" class="form-input" style="width:140px;padding:6px 10px;font-size:.82rem" title="Data inicial" />
            <input type="date" id="filter-date-to" class="form-input" style="width:140px;padding:6px 10px;font-size:.82rem" title="Data final" />
            <button class="btn btn--ghost btn--sm" id="btn-filter-payments">Filtrar</button>
          </div>
        </div>
        <div class="table-wrapper">
          <table class="table">
            <thead><tr><th>Cliente</th><th>Valor</th><th>Data</th><th>Forma</th></tr></thead>
            <tbody id="payments-body">
              <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
        <div id="payments-total" style="text-align:right;margin-top:.75rem;font-size:.85rem;color:var(--color-text-muted)"></div>
      </div>

    </main>
  </div>
  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="../pages/financial.js"></script>
</body>
</html>

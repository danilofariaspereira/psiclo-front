<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Financeiro</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main">

      <div class="page-header">
        <h1 class="page-title">Financeiro</h1>
        <button class="btn btn--primary" id="btn-add-expense">+ Nova despesa</button>
      </div>

      <!-- 4 cards -->
      <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:1.5rem">
        <div class="stat-card">
          <p class="stat-card__label">Despesas do mês</p>
          <p class="stat-card__value stat-card__value--red" id="f-expenses">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Faturamento do mês</p>
          <p class="stat-card__value stat-card__value--green" id="f-paid">—</p>
        </div>
        <div class="stat-card">
          <p class="stat-card__label">Falta para a meta</p>
          <p class="stat-card__value" id="f-remaining">—</p>
        </div>
        <div class="stat-card" style="cursor:pointer" id="card-meta" title="Clique para definir meta">
          <p class="stat-card__label">Meta do mês</p>
          <p class="stat-card__value" id="f-goal">—</p>
          <p style="font-size:.65rem;color:rgba(255,255,255,.55);margin-top:2px">Clique para definir</p>
        </div>
      </div>

      <!-- Despesas em cards -->
      <div class="card" style="margin-bottom:1.5rem">
        <p class="card__title">Despesas fixas</p>
        <div id="expenses-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:.75rem;margin-top:.75rem">
          <p style="color:var(--color-text-muted);font-size:.85rem;grid-column:1/-1">Carregando...</p>
        </div>
      </div>

      <!-- Pagamentos recebidos -->
      <div class="card">
        <p class="card__title">Pagamentos recebidos</p>
        <div class="table-wrapper" style="margin-top:.75rem">
          <table class="table">
            <thead><tr><th>Cliente</th><th>Valor</th><th>Data</th><th>Forma</th></tr></thead>
            <tbody id="payments-body">
              <tr><td colspan="4" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="../pages/financial.js"></script>
</body>
</html>

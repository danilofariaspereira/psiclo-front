<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Clientes</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main">

      <div class="page-header">
        <h1 class="page-title">Clientes</h1>
        <div style="display:flex;gap:.5rem;align-items:center">
          <input type="text" id="filter-search" class="form-input" placeholder="Buscar por nome..." style="width:200px" />
          <select id="filter-active" class="form-select" style="width:auto">
            <option value="">Todos</option>
            <option value="true">Ativos</option>
            <option value="false">Inativos</option>
          </select>
          <button class="btn btn--primary" id="btn-new-client">+ Novo cliente</button>
        </div>
      </div>

      <div id="clients-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem">
        <p style="color:var(--color-text-muted);grid-column:1/-1;text-align:center;padding:2rem">Carregando...</p>
      </div>

    </main>
  </div>
  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="../pages/clients.js"></script>
</body>
</html>

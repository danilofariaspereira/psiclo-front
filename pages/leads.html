<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSICLO — Leads</title>
  <link rel="icon" href="../img/fiveicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/reset.css" />
  <link rel="stylesheet" href="../styles/variables.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <header class="app-header" id="app-header"></header>
    <main class="app-main">

      <div class="page-header">
        <h1 class="page-title">Leads</h1>
        <div style="display:flex;gap:.5rem;align-items:center">
          <select id="filter-status" class="form-select" style="width:auto">
            <option value="">Todos</option>
            <option value="new">Novos</option>
            <option value="contacted">Contactados</option>
            <option value="converted">Convertidos</option>
            <option value="lost">Perdidos</option>
          </select>
        </div>
      </div>

      <!-- Gráficos -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">
        <div class="card card--blue">
          <p class="card__title">Conversão de leads</p>
          <p style="font-size:.75rem;color:rgba(255,255,255,.65);margin-bottom:.75rem">Proporção entre pendentes e convertidos.</p>
          <div style="position:relative;height:180px">
            <canvas id="chart-conversion"></canvas>
          </div>
        </div>
        <div class="card card--blue">
          <p class="card__title">Origem dos leads</p>
          <p style="font-size:.75rem;color:rgba(255,255,255,.65);margin-bottom:.75rem">De onde vieram seus leads.</p>
          <div style="position:relative;height:180px">
            <canvas id="chart-source"></canvas>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Nome</th>
                <th>Telefone</th>
                <th>E-mail</th>
                <th>Origem</th>
                <th>Data</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="leads-body">
              <tr><td colspan="6" style="text-align:center;padding:2rem;color:var(--color-text-muted)">Carregando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>
  </div>
  <div id="toast-container" aria-live="polite"></div>
  <script type="module" src="../pages/leads.js"></script>
</body>
</html>
